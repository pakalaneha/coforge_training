spring.application.name=SB-EMS

# embedded tomcat port no ( to change we use server.port)
server.port=1234

#Database connection properties
# MySQL Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/mydatabase
spring.datasource.username=root
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate (JPA)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true

## MySQL Dialect (optional for newer Spring Boot versions)
#spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

#Application Properties
ems.save.success = "SUCCESS : Employee Object Saved"
ems.db.fail = "FAILED : DB Error"
ems.update.success = "SUCCESS : Employee Object Updated"
ems.delete.success = "SUCCESS : Employee Object Deleted"