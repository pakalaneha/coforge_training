<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Grid System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .header{
            background-color: #4f79c7;
            height: 100px;
            line-height: 100px;
            text-align: center;
            font-size: 30px;
            font-weight: bold;
            border-radius: 15px;
            margin: 20px 0;
        }

        .box{
            height: 300px;
            line-height: 300px;
            text-align: center;
            font-size: 30px;
            font-weight: bold;
            border-radius: 20px;
        }

        .green{
            background-color: #74b34c;
        }

        .orange{
            background-color: #f47c2c;
        }

        .yellow{
            background-color: #ffc107;
        }

        .footer{
            background-color: #4f79c7;
            height: 70px;
            line-height: 70px;
            text-align: center;
            font-size: 30px;
            font-weight: bold;
            border-radius: 15px;
            margin: 20px 0;
        }
    </style>

</head>

<body>

<div class="container">

    <!-- Header -->
    <div class="row">
        <div class="col-md-12">
            <div class="header">Header</div>
        </div>
    </div>

    <!-- Three Columns -->
    <div class="row">

        <div class="col-md-4">
            <div class="box green">Column 1</div>
        </div>

        <div class="col-md-4">
            <div class="box orange">Column 2</div>
        </div>

        <div class="col-md-4">
            <div class="box yellow">Column 3</div>
        </div>

    </div>

    <!-- Footer -->
    <div class="row">
        <div class="col-md-12">
            <div class="footer">Footer</div>
        </div>
    </div>

</div>

</body>
</html>
