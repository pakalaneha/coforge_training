<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Employee Management System</title>
<link href = "EMSStyle.css" rel="stylesheet">
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
</head>
<body>

	<div class="header">
		<h1>Employee Management System</h1>
	</div>
	
	<br>
	
	<div class="content">
		<table>
			<tr>
				<td>Employee ID :</td>
				<td><input type="text"></td>
			</tr>
			<tr>
				<td>Employee Name :</td>
				<td><input type="password"></td>
			</tr>
			<tr>
				<td>Employee Salary :</td>
				<td><input type="text"></td>
			</tr>
			<tr>
				<td>Department No :</td>
				<td><input type="text"></td>
			</tr>
		</table>
		
		<br>
		<input type="submit" value="insert" class = "btn-primary">&nbsp; &nbsp;
		<input type="submit" value="Delete" class = "btn-danger">&nbsp; &nbsp;
		<input type="submit" value="Update" class = "btn-warning">&nbsp; &nbsp;
		<input type="submit" value="Find"class = "btn-success">&nbsp; &nbsp;
		<input type="submit" value="FindAll" class = "btn-info">
		<br>				
	</div>
	
</body>
</html>
