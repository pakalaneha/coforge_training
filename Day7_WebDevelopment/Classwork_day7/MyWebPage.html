<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>My Web Page</title>
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
</head>
<body>
	<b>Welcome to HTML</b>
	<br>
	<b><u><font color="blue">Welcome</font></u></b>
	<i><font color="green" size="20"> Neha</font></i>
	<!--Block level tags-->
	<h1>NEHA</h1>
	<h2>NEHA</h2>
	<h3>NEHA</h3>
	<h4>NEHA</h4>
	<h5>NEHA</h5>
	<h6>NEHA</h6>

	<!-- unordered list -->
	<ul type="square">
		<li>Apple</li>
		<li>Orange</li>
		<li>Grapes</li>
	</ul>

	<!-- ordered list -->
	<ol type="A">
		<li>Apple</li>
		<li>Orange</li>
		<li>Grapes</li>
	</ol>

	<ol type="A" start="3">
		<li>Apple</li>
		<li>Orange</li>
		<li>Grapes</li>
	</ol>

	<table border="1" width="100%" class="table-hover">
		<tr bgcolor="yellow">
			<th>EID</th>
			<th>EName</th>
			<th>ESalary</th>
		</tr>
		<tr>
			<td>1</td>
			<td>Neha</td>
			<td>15000</td>
		</tr>
		<tr>
			<td>2</td>
			<td>Harshika</td>
			<td>15000</td>
		</tr>
	</table>


	<!-- image -->
	<!-- Removed the height attribute completely so the browser auto-scales the aspect ratio proportionally -->
	<img
		src="https://images.unsplash.com/photo-1782741575084-7b8f4cb5934f?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHwxMnx8fGVufDB8fHx8fA%3D%3D"
		width="25%" align="middle" alt="Pink Calla Lily Flowers" class = "img-thumbnail">

	<!-- HTML-Only Implementation -->
	<!-- width uses pure percentage numbers to prevent image distortion -->
	<!-- align="middle" replaces the CSS vertical-align property -->
	<img
		src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRSIgREq5OCpPgkudJXB6OCgqrT16kAgTttO5e60UgQWQ&s=10"
		width="25%" align="middle" alt="Spider Man" class = "img-thumbnail">


	<br>
	<!-- anchor tag -->
	<a href="https://unsplash.com/"> unsplash </a>
	<!-- target="_blank": Opens the link in a brand new tab -->
	<!-- rel="noopener noreferrer": Protects your site from security vulnerabilities -->
	<p>
		<a href="https://unsplash.com" target="_blank"
			rel="noopener noreferrer"> 1. Visit Unsplash (External Site) </a>
	</p>



</body>
</html>
