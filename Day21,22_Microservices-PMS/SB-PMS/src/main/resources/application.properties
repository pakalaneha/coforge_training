#spring.application.name=SB-PMS
spring.application.name=SB-PMS-SERVICE
# embedded tomcat port no ( to change we use server.port)
server.port=3333

#Database connection properties
# MySQL Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/mydatabase
spring.datasource.username=root
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate (JPA)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true

## MySQL Dialect (optional for newer Spring Boot versions)
#spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

#Application Properties
pms.save.success = "SUCCESS : Product Object Saved"
pms.db.fail = "FAILED : DB Error"
pms.update.success = "SUCCESS : Product Object Updated"
pms.delete.success = "SUCCESS : Product Object Deleted"
pms.invalid.not-found = "Product Details Not Found"
pms.invalid.product-details= "FAILED : Invalid Product Object Details"
pms.invalid.supplier-not-found = "FAILED : Department Not Found"

#ip address 
eureka.instance.hostname=localhost

#Stop registering as a client. It is a Server
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true