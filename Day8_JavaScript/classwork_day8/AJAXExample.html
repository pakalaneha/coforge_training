<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Registration Form</title>
<script>
	function passwordStrength() {
		var password = document.getElementById("pwd").value;
		
		var req = new XMLHttpRequest(); //object creation for ajax functionality
		req.open("GET","http://localhost:8022/MyWebApplication/PasswordStrengthServlet?pwd="+password);
		//opening connection with server with get method
		// ?pwd + password is the query string -- sending data to server
		// argument true is -- communicate asynchronously
		req.onreadystatechange = function() {
			//alert(req.responseText);
			if(req.readyState == 4 && req.status == 200){
				// 200 is sucess state
				document.getElementById("result").innerHTML = req.responseText;
			}
		};
		req.send();
	
	}
</script>
</head>
<body>

	<!-- Asynchronous call without refresh reload the page updates automatically by interacting with server -->
	<!-- latest is kafka earlier-ajax -->
	<table border ="1" cellpadding="10" width = "80%">
		<tr><th colspan = "2">Registration Form</th></tr>
	<tr>
		<td width="30%">Student Name</td>
		<td><input type="text"></td>
	</tr>
	<tr>
		<td>Father's Name</td>
		<td><input type="text"></td>
	</tr>
	<tr>
		<td>Mother's Name</td>
		<td><input type="text"></td>
	</tr>
	<tr>
		<td>Date of Birth</td>
		<td><input type="date"></td>
	</tr>
	<tr>
		<td>Gender</td>
		<td>
			<label><input type="radio" name= "gender" value="male">Male</label>
			<label><input type="radio" name = "gender"value="female">Female</label>
		</td>
	</tr>
	<tr>
		<td>Email ID</td>
		<td><input type="email"></td>
	</tr>
	<tr>
		<td>Password</td>
		<td><input type="password" id="pwd" onkeyup="passwordStrength()"/><span id="result"></span></td>
	</tr>
	<tr>
		<td>Mobile No.</td>
		<td><input type="tel"></td>
	</tr>
	<tr>
		<td>Address</td>
		<td><textarea rows="3"></textarea></td>
	</tr>
	<tr>
		<td>State</td>
		<td><input type="text"></td>
	</tr>
	<tr>
		<td>City</td>
		<td><input type="text"></td>
	</tr>
	<tr>
		<td></td>
		<td><input type="submit" value="Submit"></td>
	</tr>
	</table>
</body>
</html>
