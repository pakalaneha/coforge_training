<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Calculator</title>
<script type = "text/javascript">
	function calculate(operator) {
		//dom elements document object model
		// html elements are called as dom elements
		var n1 = parseInt(document.getElementById("n1").value);
		var n2 = parseInt(document.getElementById("n2").value);
		var result = "";
		
		if(operator == "add")
			result = "Addition : " + (n1 + n2);
		if(operator == "sub")
			result = "Subtraction : " + (n1 - n2);
		if(operator == "mul")
			result = "Multiplication : " + (n1 * n2);
		if(operator == "div")
			result = "Division : " + (n1 / n2);
		
		document.getElementById("ResultDiv").innerHTML = "<b>" + result + "</b>";
		
	}
</script>
</head>
<body>
	Enter No1<input type ="number" id="n1"/>
	Enter No2<input type ="number" id="n2"/>
	<br>
	<button onclick="calculate('add')">Addition</button>
	<button onclick="calculate('sub')">Subtraction</button>
	<button onclick="calculate('mul')">Multiplication</button>
	<button onclick="calculate('div') ">Division</button>
	<br>
	<div id="ResultDiv">
		
	</div>
</body>
</html>
