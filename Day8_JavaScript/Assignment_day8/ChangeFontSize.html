<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Change Font Size</title>
<script type = "text/javascript">
	function changeSize() {
		document.getElementById("cfs").style.fontSize= '30px';
	}
</script>
</head>
<body>
	<p id = 'cfs' style='font-size: 16px'>This text will grow larger!</font>
	<br>
	<button onclick = "changeSize()">Increase Font Size</button>
</body>
</html>
